{% extends 'clients/document_create_base.html' %}

{% block provider_section %}
<!-- 居宅サービス計画の作成を依頼（変更）する事業者 -->
<div class="row g-3 mb-4">
    <div class="col-12">
        <label class="form-label">居宅サービス計画の作成を依頼（変更）する居宅介護支援事業者 <span class="text-danger">*</span></label>
        <div class="d-flex flex-column gap-2" style="width: fit-content;">
            <select id="kyotaku_provider_select" class="form-select" style="width: 400px;" onchange="toggleKyotakuProvider()">
                <option value="auto" selected>{{ initial_data.kyotaku_office_name|default:"（事業所未設定）" }}</option>
                <option value="other">その他（手入力）</option>
            </select>
            <input type="text" id="kyotaku_provider_manual" class="form-control d-none" style="width: 400px;" placeholder="事業所名をご入力ください">
            <input type="hidden" name="kyotaku_provider" id="kyotaku_provider" value="">
        </div>
        <small class="text-muted mt-1">※その他を選択すると、事業所名を手入力できます</small>
    </div>
</div>

<script>
function toggleKyotakuProvider() {
    const selectEl = document.getElementById('kyotaku_provider_select');
    const manualEl = document.getElementById('kyotaku_provider_manual');
    const hiddenEl = document.getElementById('kyotaku_provider');
    const editBtnWrapper = document.getElementById('kyotaku_edit_button_wrapper');
    const officeNum = document.getElementById('kyotaku_office_number');
    const postalCode = document.getElementById('kyotaku_postal_code');
    const address = document.getElementById('kyotaku_address');
    const phone = document.getElementById('kyotaku_phone');

    if (!selectEl || !manualEl || !hiddenEl) return;
    
    if (selectEl.value === 'other') {
        manualEl.classList.remove('d-none');
        manualEl.setAttribute('name', 'kyotaku_provider');
        hiddenEl.removeAttribute('name');

        if (editBtnWrapper) editBtnWrapper.classList.add('d-none');
        if (officeNum) { officeNum.removeAttribute('readonly'); officeNum.value = ''; }
        if (postalCode) { postalCode.removeAttribute('readonly'); postalCode.value = ''; }
        if (address) { address.removeAttribute('readonly'); address.value = ''; }
        if (phone) { phone.removeAttribute('readonly'); phone.value = ''; }
    } else {
        manualEl.classList.add('d-none');
        manualEl.removeAttribute('name');
        hiddenEl.setAttribute('name', 'kyotaku_provider');

        if (editBtnWrapper) editBtnWrapper.classList.remove('d-none');
        if (officeNum) { officeNum.setAttribute('readonly', 'readonly'); officeNum.value = officeNum.defaultValue; }
        if (postalCode) { postalCode.setAttribute('readonly', 'readonly'); postalCode.value = postalCode.defaultValue; }
        if (address) { address.setAttribute('readonly', 'readonly'); address.value = address.defaultValue; }
        if (phone) { phone.setAttribute('readonly', 'readonly'); phone.value = phone.defaultValue; }
    }
}
</script>

<!-- 事業所情報 -->
<div id="kyotaku_detail_section" class="accordion" style="margin: 0.5rem 0 1rem 0;">
    <div class="accordion-item" style="border: none; background-color: #f8f9fa; border-radius: 0.5rem;">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#kyotakuDetailCollapse" aria-expanded="false" aria-controls="kyotakuDetailCollapse" style="background-color: #f8f9fa; padding: 0.5rem 1rem; color: #333;">
                <span id="kyotaku_status_icon" class="me-2"><i class="fas fa-check-circle" style="color: rgba(25, 135, 84, 0.5);"></i></span>事業所情報
            </button>
        </h2>
        <div id="kyotakuDetailCollapse" class="accordion-collapse collapse">
            <div class="accordion-body row g-3" style="padding: 0.5rem 1rem 1rem 1rem;">
                <div class="col-md-4">
                    <label class="form-label">事業所番号 <span class="text-danger">*</span></label>
                    <input type="text" name="kyotaku_office_number" id="kyotaku_office_number" class="form-control" value="{{ initial_data.kyotaku_office_number|default:'' }}" readonly>
                </div>
                <div class="col-12">
                    <label class="form-label">所在地 <span class="text-danger">*</span></label>
                    <div class="d-flex gap-2">
                        <div class="input-group" style="width: 140px; flex-shrink: 0;">
                            <span class="input-group-text">〒</span>
                            <input type="text" name="kyotaku_postal_code" id="kyotaku_postal_code" class="form-control" value="{{ initial_data.kyotaku_postal_code|default:'' }}" placeholder="000-0000" maxlength="8" style="width: 90px;" readonly>
                        </div>
                        <div class="flex-grow-1">
                            <input type="text" name="kyotaku_address" id="kyotaku_address" class="form-control" value="{{ initial_data.kyotaku_address|default:'' }}" placeholder="住所を入力" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">電話番号 <span class="text-danger">*</span></label>
                    <input type="text" name="kyotaku_phone" id="kyotaku_phone" class="form-control" value="{{ initial_data.kyotaku_phone|default:'' }}" placeholder="電話番号を入力" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">担当者氏名 <span class="text-danger">*</span></label>
                    <input type="text" name="kyotaku_staff_name" id="kyotaku_staff_name" class="form-control" value="{% if initial_data.kyotaku_staff_name %}{{ initial_data.kyotaku_staff_name }}{% elif user.is_authenticated %}{{ user.profile.get_full_name }}{% endif %}" placeholder="担当者氏名を入力">
                </div>

                <!-- 編集ボタン -->
                <div id="kyotaku_edit_button_wrapper" class="col-12 text-end mt-2">
                    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="openOfficeMasterDrawer();">
                        <i class="fas fa-edit me-1"></i>事業所マスタデータを編集
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- 事業所マスタ編集モーダル（form タグなし：documentForm のネスト回避） -->
<div class="modal fade" id="kyotakuOfficeModal" tabindex="-1" aria-labelledby="kyotakuOfficeModalLabel" aria-hidden="true"
     data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <input type="hidden" id="kyotaku_modal_pk" value="{{ initial_data.kyotaku_office_id|default:'' }}">
            <div class="modal-header">
                <h5 class="modal-title" id="kyotakuOfficeModalLabel">
                    <i class="fas fa-hospital me-2"></i>居宅介護支援事業所編集
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="kyotakuModalError" class="alert alert-danger d-none"></div>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">事業所名 <span class="text-danger">*</span></label>
                        <input type="text" id="kyotaku_modal_name" class="form-control"
                               value="{{ initial_data.kyotaku_office_name|default:'' }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">フリガナ</label>
                        <input type="text" id="kyotaku_modal_furigana" class="form-control"
                               value="{{ initial_data.kyotaku_office_furigana|default:'' }}"
                               placeholder="例: キョタクカイゴシエンジギョウショ アノツロマン">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">事業所番号 <span class="text-danger">*</span></label>
                        <input type="text" id="kyotaku_modal_office_number" class="form-control"
                               value="{{ initial_data.kyotaku_office_number|default:'' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">管理者名</label>
                        <input type="text" id="kyotaku_modal_manager" class="form-control"
                               value="{{ initial_data.kyotaku_office_manager|default:'' }}"
                               placeholder="例: 山田 太郎">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">郵便番号</label>
                        <input type="text" id="kyotaku_modal_postal_code" class="form-control"
                               value="{{ initial_data.kyotaku_postal_code|default:'' }}" placeholder="例: 514-0009">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">住所</label>
                        <input type="text" id="kyotaku_modal_address" class="form-control"
                               value="{{ initial_data.kyotaku_address|default:'' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">電話番号</label>
                        <input type="text" id="kyotaku_modal_phone" class="form-control"
                               value="{{ initial_data.kyotaku_phone|default:'' }}" placeholder="例: 059-123-4567">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">FAX</label>
                        <input type="text" id="kyotaku_modal_fax" class="form-control"
                               value="{{ initial_data.kyotaku_office_fax|default:'' }}" placeholder="例: 059-123-4568">
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox" id="kyotaku_modal_is_active" class="form-check-input" checked>
                            <label class="form-check-label" for="kyotaku_modal_is_active">有効</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                <button type="button" class="btn btn-primary" id="kyotakuOfficeSaveBtn">
                    <i class="fas fa-save me-1"></i>保存して反映
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block request_reason_section %}
<!-- 依頼事由（居宅版） -->
<div class="row g-3 mb-4">
    <div class="col-12">
        <label class="form-label">居宅サービス計画の作成を依頼（変更）する事由 <span class="text-danger">*</span></label>
        <div class="mt-2">
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="request_reason" id="reason_new" value="new_or_change" style="border-radius: 3px;" {% if initial_data.reason_new_or_change %}checked{% endif %}>
                <label class="form-check-label" for="reason_new">
                    新規または事業所変更のため
                </label>
            </div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="request_reason" id="reason_level_change" value="level_change" style="border-radius: 3px;" {% if initial_data.reason_level_change %}checked{% endif %}>
                <label class="form-check-label" for="reason_level_change">
                    要支援から要介護へ変更のため
                </label>
            </div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="request_reason" id="reason_provisional" value="provisional_different" style="border-radius: 3px;" {% if initial_data.reason_provisional_different %}checked{% endif %}>
                <label class="form-check-label" for="reason_provisional">
                    暫定での届出と認定結果が異なるため
                </label>
            </div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="request_reason" id="reason_other" value="other" style="border-radius: 3px;" {% if initial_data.reason_other %}checked{% endif %}>
                <label class="form-check-label" for="reason_other">
                    その他
                </label>
            </div>
            <div id="other_reason_input" style="{% if initial_data.reason_other %}display: block;{% else %}display: none;{% endif %}" class="mt-3">
                <label class="form-label">その他の事由（具体的に） <small class="text-muted">※全角25文字まで</small></label>
                <div style="width: 420px;">
                    <input type="text" name="other_reason_detail" id="other_reason_detail" class="form-control" placeholder="具体的な事由を入力" value="{{ initial_data.other_reason_detail|default:'' }}" maxlength="25">
                    <div class="text-end mt-1"><small class="text-muted"><span id="other_reason_count">0</span>/25文字</small></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_styles %}{% endblock %}

{% block extra_scripts %}
<script>
const kyotakuCsrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

// 事業所情報のステータスアイコンを更新
window.updateKyotakuStatusIcon = function() {
    const statusIcon = document.getElementById('kyotaku_status_icon');
    if (!statusIcon) return;
    const staffName = document.getElementById('kyotaku_staff_name');
    const isComplete = staffName && staffName.value.trim() !== '';
    statusIcon.innerHTML = isComplete
        ? '<i class="fas fa-check-circle" style="color: rgba(25, 135, 84, 0.5);"></i>'
        : '<i class="fas fa-circle-exclamation" style="color: rgba(220, 53, 69, 0.5);"></i>';
};

// 居宅版のバリデーション
function validateKyotakuProvider() {
    const staffName = document.getElementById('kyotaku_staff_name');
    const openAccordionAndFocus = function(element) {
        const collapse = document.getElementById('kyotakuDetailCollapse');
        if (collapse && !collapse.classList.contains('show')) {
            new bootstrap.Collapse(collapse, { show: true });
            setTimeout(function() { element.focus(); element.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 400);
        } else {
            element.focus();
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    };
    if (!staffName || !staffName.value.trim()) {
        alert('担当者氏名を入力してください。');
        openAccordionAndFocus(staffName);
        return false;
    }
    return true;
}

// 居宅版専用の初期化
function initDocumentSpecific() {
    const otherReasonDetail = document.getElementById('other_reason_detail');
    const otherReasonCount = document.getElementById('other_reason_count');
    if (otherReasonDetail && otherReasonCount) {
        otherReasonCount.textContent = otherReasonDetail.value.length;
        otherReasonDetail.addEventListener('input', function() { otherReasonCount.textContent = this.value.length; });
    }
    updateKyotakuStatusIcon();
    const staffNameField = document.getElementById('kyotaku_staff_name');
    if (staffNameField) { staffNameField.addEventListener('input', updateKyotakuStatusIcon); }
}

// 居宅版のバリデーション（ベーステンプレートから呼び出される）
function validateDocumentSpecific() {
    return validateKyotakuProvider();
}

// 事業所編集モーダルを開く
function openOfficeMasterDrawer() {
    document.getElementById('kyotakuModalError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('kyotakuOfficeModal')).show();
}

// 事業所保存ボタン
document.addEventListener('DOMContentLoaded', function() {
    const saveBtn = document.getElementById('kyotakuOfficeSaveBtn');
    if (!saveBtn) return;

    saveBtn.addEventListener('click', function() {
        const pk = document.getElementById('kyotaku_modal_pk').value;
        if (!pk) {
            alert('事業所が設定されていません。');
            return;
        }
        const url = `/clients/home-care-offices/${pk}/edit/`;
        const formData = new FormData();
        formData.append('name',           document.getElementById('kyotaku_modal_name').value);
        formData.append('furigana',       document.getElementById('kyotaku_modal_furigana').value);
        formData.append('office_number',  document.getElementById('kyotaku_modal_office_number').value);
        formData.append('manager_name',   document.getElementById('kyotaku_modal_manager').value);
        formData.append('postal_code',    document.getElementById('kyotaku_modal_postal_code').value);
        formData.append('address',        document.getElementById('kyotaku_modal_address').value);
        formData.append('phone',          document.getElementById('kyotaku_modal_phone').value);
        formData.append('fax',            document.getElementById('kyotaku_modal_fax').value);
        if (document.getElementById('kyotaku_modal_is_active').checked) {
            formData.append('is_active', 'true');
        }

        fetch(url, {
            method: 'POST',
            headers: { 'X-CSRFToken': kyotakuCsrfToken, 'X-Requested-With': 'XMLHttpRequest' },
            body: formData,
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                // 書類フォームのフィールドを更新
                const name        = document.getElementById('kyotaku_modal_name').value;
                const officeNum   = document.getElementById('kyotaku_modal_office_number').value;
                const postalCode  = document.getElementById('kyotaku_modal_postal_code').value;
                const address     = document.getElementById('kyotaku_modal_address').value;
                const phone       = document.getElementById('kyotaku_modal_phone').value;

                const providerSelect = document.getElementById('kyotaku_provider_select');
                if (providerSelect && providerSelect.options[0]) providerSelect.options[0].text = name;
                const numEl = document.getElementById('kyotaku_office_number');
                if (numEl) { numEl.value = officeNum; numEl.defaultValue = officeNum; }
                const pcEl = document.getElementById('kyotaku_postal_code');
                if (pcEl) { pcEl.value = postalCode; pcEl.defaultValue = postalCode; }
                const addrEl = document.getElementById('kyotaku_address');
                if (addrEl) { addrEl.value = address; addrEl.defaultValue = address; }
                const phoneEl = document.getElementById('kyotaku_phone');
                if (phoneEl) { phoneEl.value = phone; phoneEl.defaultValue = phone; }

                bootstrap.Modal.getInstance(document.getElementById('kyotakuOfficeModal')).hide();
                if (typeof updateKyotakuStatusIcon === 'function') updateKyotakuStatusIcon();
            } else {
                const errEl = document.getElementById('kyotakuModalError');
                errEl.textContent = data.error || 'エラーが発生しました。';
                errEl.classList.remove('d-none');
            }
        })
        .catch(() => {
            const errEl = document.getElementById('kyotakuModalError');
            errEl.textContent = '通信エラーが発生しました。';
            errEl.classList.remove('d-none');
        });
    });
});
</script>
{% endblock %}
