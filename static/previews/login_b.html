<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>案B - ダーク背景</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
  background: #0f172a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  width: 360px;
  background: #1e293b;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.08);
}
.card-top {
  padding: 32px 32px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  gap: 14px;
}
.icon {
  width: 46px; height: 46px;
  background: #2563eb;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
h1 { color: #f1f5f9; font-size: 1.1rem; font-weight: 700; }
.sub { color: #64748b; font-size: 0.72rem; margin-top: 3px; }

.card-body { padding: 28px 32px 32px; }
.field { margin-bottom: 18px; }
label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  color: #64748b;
  margin-bottom: 6px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  font-size: 0.95rem;
  color: #e2e8f0;
  background: rgba(255,255,255,0.05);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
}
input::placeholder { color: #475569; }
button {
  width: 100%;
  margin-top: 8px;
  padding: 12px;
  background: #2563eb;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
button:hover { background: #1d4ed8; }
.note { text-align: center; font-size: 0.7rem; color: #475569; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="icon">🏥</div>
    <div>
      <h1>ケア管理</h1>
      <p class="sub">介護ケアマネジメントシステム</p>
    </div>
  </div>
  <div class="card-body">
    <div class="field">
      <label>ユーザー名</label>
      <input type="text" placeholder="username">
    </div>
    <div class="field">
      <label>パスワード</label>
      <input type="password" placeholder="••••••••">
    </div>
    <button>ログイン</button>
    <p class="note">アカウントはシステム管理者にお問い合わせください</p>
  </div>
</div>
</body>
</html>
